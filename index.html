<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDER</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* Profile */
.profile{
margin-top:25px;
width:180px;
border-radius:50%;
border:3px solid #444;
}

h1{
margin:10px 0 5px;
letter-spacing:3px;
}

p{
color:#aaa;
margin-bottom:15px;
}

/* Search */
input{
padding:10px;
width:220px;
border-radius:20px;
border:none;
outline:none;
margin:5px;
}

/* Button */
button{
padding:10px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#444;
color:white;
margin:5px;
}

/* Gallery */
.gallery{
column-count:2;
column-gap:10px;
padding:15px;
}

.gallery img{
width:100%;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

@media(min-width:800px){
.gallery{column-count:4;}
}

/* Viewer */
#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

#viewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
}
</style>

</head>

<body>

<!-- PROFILE -->
<img class="profile" src="IMG_20260529_172035022_HDR_PORTRAIT.jpg">
<h1>HYDER</h1>
<p>Welcome to my personal website 🚀</p>

<!-- UPLOAD SECTION -->
<input type="file" accept="image/*" id="uploader">
<button onclick="addImage()">Add Image</button>

<br>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search images...">

<!-- GALLERY -->
<div class="gallery" id="gallery">

<img src="img1.jpg" onclick="openImg(this.src)">
<img src="img2.jpg" onclick="openImg(this.src)">
<img src="IMG_20260610_192912395_HDR.jpg" onclick="openImg(this.src)">
<img src="Snapchat-1800708327.jpg" onclick="openImg(this.src)">

</div>

<!-- VIEWER -->
<div id="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<!-- SCRIPT -->
<script>

// Open image full screen
function openImg(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}

// Upload image and add to gallery
function addImage(){
  let fileInput = document.getElementById("uploader");
  let file = fileInput.files[0];

  if(!file){
    alert("Please select an image first");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    let img = document.createElement("img");
    img.src = e.target.result;
    img.onclick = function(){
      openImg(this.src);
    };

    document.getElementById("gallery").appendChild(img);
  };

  reader.readAsDataURL(file);
}

// Search filter
document.getElementById("search").addEventListener("input", function(){
  let value = this.value.toLowerCase();
  let images = document.querySelectorAll(".gallery img");

  images.forEach(img=>{
    let src = img.src.toLowerCase();
    if(src.includes(value)){
      img.style.display="block";
    }else{
      img.style.display="none";
    }
  });
});

</script>

</body>
</html>
