<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDER</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* Profile Image */
.profile{
margin-top:30px;
width:180px;
border-radius:50%;
}

/* Title */
h1{
margin-top:15px;
}

/* Search */
input{
margin-top:15px;
padding:10px;
width:220px;
border-radius:20px;
border:none;
outline:none;
}

/* Gallery */
.gallery{
column-count:2;
column-gap:10px;
padding:15px;
}

.gallery img{
width:100%;
margin-bottom:10px;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

@media(min-width:800px){
.gallery{column-count:4;}
}

</style>

</head>

<body>

<!-- Profile Image -->
<img class="profile" src="IMG_20260529_172035022_HDR_PORTRAIT.jpg">

<!-- Name -->
<h1>HYDER</h1>

<!-- Text -->
<p>Welcome to my personal website 🚀</p>

<!-- Search -->
<input type="text" placeholder="Search...">

<br><br>

<!-- Gallery -->
<div class="gallery">

<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">

</div>

</body>
</html>
