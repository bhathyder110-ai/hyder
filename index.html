<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDER</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
position:sticky;
top:0;
}

h1{
font-size:40px;
letter-spacing:5px;
}

p{
color:#aaa;
margin-top:5px;
}

input{
margin-top:20px;
width:90%;
max-width:500px;
padding:12px;
border:none;
border-radius:25px;
font-size:16px;
outline:none;
}

.gallery{
column-count:2;
column-gap:15px;
padding:15px;
}

.card{
margin-bottom:15px;
break-inside:avoid;
cursor:pointer;
}

.card img{
width:100%;
border-radius:15px;
transition:.3s;
}

.card img:hover{
transform:scale(1.03);
}

@media(min-width:800px){
.gallery{
column-count:4;
}
}

#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
}

#viewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
}
</style>

</head>

<body>
<img src="photo.jpg" width="300">
<header>

<h1>HYDER</h1>

<p>Capture • Create • Inspire</p>

<input type="text" id="search" placeholder="Search Photos">

</header>

<div class="gallery">

<div class="card">
<img src="https://picsum.photos/id/1015/600/900">
</div>

<div class="card">
<img src="https://picsum.photos/id/1016/600/800">
</div>

<div class="card">
<img src="https://picsum.photos/id/1025/600/700">
</div>

<div class="card">
<img src="https://picsum.photos/id/1035/600/900">
</div>

<div class="card">
<img src="https://picsum.photos/id/1043/600/800">
</div>

<div class="card">
<img src="https://picsum.photos/id/1050/600/900">
</div>

</div>

<div id="viewer">
<img id="big">
</div>

<script>

const cards=document.querySelectorAll(".card img");
const viewer=document.getElementById("viewer");
const big=document.getElementById("big");

cards.forEach(img=>{
img.onclick=()=>{
viewer.style.display="flex";
big.src=img.src;
}
});

viewer.onclick=()=>{
viewer.style.display="none";
}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

cards.forEach(img=>{

if(img.src.toLowerCase().includes(value))
img.parentElement.style.display="block";
else
img.parentElement.style.display="none";

});

});

</script>

</body>
</html>
